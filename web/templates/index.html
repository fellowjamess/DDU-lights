<!DOCTYPE html>
<html>
<head>
    <title>LED Control Dashboard</title>
    <style>
        .led-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px;
        }
        .led-control {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="led-grid" id="ledControls"></div>

    <script>
        const numLEDs = 20;
        const ledGrid = document.getElementById('ledControls');

        // Create LED controls
        for (let i = 0; i < numLEDs; i++) {
            const div = document.createElement('div');
            div.className = 'led-control';
            div.innerHTML = `
                <h3>LED ${i}</h3>
                <input type="color" id="color-${i}" value="#000000">
                <button onclick="updateLED(${i})">Update</button>
            `;
            ledGrid.appendChild(div);
        }

        function updateLED(id) {
            const color = document.getElementById(`color-${id}`).value;
            fetch('/api/lights', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    type: 'update',
                    led: id,
                    color: color
                })
            });
        }
    </script>
</body>
</html>
