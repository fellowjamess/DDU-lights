<!DOCTYPE html>
<html>
<head>
    <title>3D Christmas Tree Lights</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; }
        #container { 
            display: flex;
            height: 100vh;
        }
        #three-container { 
            flex: 0.5;
            position: relative;
        }
        #controls {
            flex: 1;
            padding: 20px;
            background: #f0f0f0;
            overflow-y: auto;
        }
        .led-control {
            margin: 5px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: inline-block;
            width: 200px;
            vertical-align: top;
        }

        .controls-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .led-control h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 3px;
            padding: 5px 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        .all-leds-control {
            width: 100%;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #e0e0e0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="three-container"></div>
        <div id="controls">
            <h2>LED Controls</h2>
            <div class="all-leds-control">
                <h3>All LEDs</h3>
                <div class="control-row">
                    <input type="color" id="all-color" value="#000000">
                    <button onclick="updateAll()">Update All</button>
                </div>
            </div>
            <div class="controls-grid" id="individual-controls"></div>
        </div>
    </div>

    <script>
        const ledPositions = {{ led_positions|safe }};
        let scene, camera, renderer, lights = [];
        let controls;

        function init() {
            // Setup Three.js scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);

            // Setup camera with better initial position
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / 2 / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);

            // Setup renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth / 2, window.innerHeight);
            document.getElementById('three-container').appendChild(renderer.domElement);

            // Add OrbitControls for better interaction
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Add ambient and directional light
            const ambientLight = new THREE.AmbientLight(0x404040);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(5, 5, 5);
            scene.add(ambientLight);
            scene.add(directionalLight);

            // Add coordinate axes helper
            const axesHelper = new THREE.AxesHelper(5);
            scene.add(axesHelper);

            // Add grid helper
            const gridHelper = new THREE.GridHelper(10, 10);
            scene.add(gridHelper);

            // Create LED representations
            ledPositions.forEach(pos => {
                const geometry = new THREE.SphereGeometry(0.1, 16, 16);
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0x000000,
                    emissive: 0x000000
                });
                const light = new THREE.Mesh(geometry, material);
                
                // Set position from data
                light.position.set(pos.x, pos.y, pos.z);
                scene.add(light);
                lights[pos.id] = light;

                // Create individual LED controls with updated structure
                const control = document.createElement('div');
                control.className = 'led-control';
                control.innerHTML = `
                    <h3>LED ${pos.id}</h3>
                    <div class="control-row">
                        <input type="color" id="color-${pos.id}" value="#000000">
                        <button onclick="updateLED(${pos.id})">Update</button>
                    </div>
                `;
                document.getElementById('individual-controls').appendChild(control);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Update controls in animation loop
            renderer.render(scene, camera);
        }

        function updateLED(id) {
            const color = document.getElementById(`color-${id}`).value;
            const rgbColor = new THREE.Color(color);
            
            fetch('/update_led', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    id: id,
                    color: color
                })
            }).then(response => response.json())
              .then(data => {
                  if (data.success) {
                      lights[id].material.color.set(rgbColor);
                      lights[id].material.emissive.set(rgbColor);
                      lights[id].material.needsUpdate = true;
                  }
              });
        }

        function updateAll() {
            const color = document.getElementById('all-color').value;
            const rgbColor = new THREE.Color(color);
            
            fetch('/update_all', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    color: color
                })
            }).then(response => response.json())
              .then(data => {
                  if (data.success) {
                      Object.values(lights).forEach(light => {
                          light.material.color.set(rgbColor);
                          light.material.emissive.set(rgbColor);
                          light.material.needsUpdate = true;
                      });
                  }
              });
        }

        // Initialize everything
        init();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / 2 / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth / 2, window.innerHeight);
        });
    </script>
</body>
</html>
