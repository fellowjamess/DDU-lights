<!DOCTYPE html>
<html>
<head>
    <title>3D Christmas Tree Lights</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden;
        }
        #container { 
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        #three-container { 
            flex: 1;
            position: relative;
            width: 33.33%;
        }
        #controls {
            flex: 1;
            width: 33.33%;
            padding: 20px;
            background: #f0f0f0;
            overflow-y: auto;
        }
        #music-container {
            flex: 1;
            width: 33.33%;
            padding: 20px;
            background: linear-gradient(145deg, #2c3e50, #3498db);
            overflow-y: auto;
        }
        
        /* Update renderer size in JavaScript */
        .led-control {
            margin: 5px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: calc(50% - 30px);
            display: inline-block;
        }
        
        .controls-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .led-control h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 3px;
            padding: 5px 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        .all-leds-control {
            width: 100%;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #e0e0e0;
            border-radius: 5px;
        }

        .animation-control {
            width: 100%;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #e0e0e0;
            border-radius: 5px;
        }
        
        #rainStart, #rainStop {
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 16px;
            cursor: pointer;
        }
        
        #rainStop {
            background-color: #ff9999;
        }
        
        #rainStart {
            background-color: #99ff99;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .music-control {
            width: 100%;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #e0e0e0;
            border-radius: 5px;
        }
        
        #musicInfo {
            font-size: 14px;
            color: #333;
        }

        .music-control {
            width: 100%;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(145deg, #2c3e50, #3498db);
            border-radius: 10px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .music-control h3 {
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
        }

        .music-upload {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        #musicUpload {
            padding: 10px;
            border-radius: 5px;
            background: white;
        }

        .music-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        #beatStart, #beatStop {
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #beatStart {
            background: #2ecc71;
            color: white;
        }

        #beatStop {
            background: #e74c3c;
            color: white;
        }

        #musicInfo {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="three-container"></div>
        <div id="controls">
            <h2>LED Controls</h2>
            <div class="all-leds-control">
                <h3>All LEDs</h3>
                <div class="control-row">
                    <input type="color" id="all-color" value="#000000">
                    <button onclick="updateAll()">Update All</button>
                </div>
            </div>
            <div class="animation-control">
                <h3>Rain Animation</h3>
                <div class="control-row">
                    <button onclick="startRain()" id="rainStart">Start Rain</button>
                    <button onclick="stopRain()" id="rainStop">Stop Rain</button>
                </div>
            </div>
            <div class="controls-grid" id="individual-controls"></div>
        </div>
        <div id="music-container">
            <div class="music-control">
                <h3>Music Beat Visualization</h3>
                <div class="music-upload">
                    <input type="file" id="musicUpload" accept="audio/*">
                    <button onclick="uploadMusic()" class="upload-btn">Upload</button>
                </div>
                <div id="musicInfo">
                    <!-- Music info will be displayed here -->
                </div>
                <div class="music-buttons">
                    <button onclick="startBeatAnimation()" id="beatStart">Start Beat Show</button>
                    <button onclick="stopBeatAnimation()" id="beatStop">Stop Beat Show</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const ledPositions = {{ led_positions|safe }};
        let scene, camera, renderer, lights = [];
        let controls;

        function init() {
            // Setup Three.js scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);

            // Setup camera with better initial position
            const containerWidth = window.innerWidth / 3;
            const containerHeight = window.innerHeight;
            camera = new THREE.PerspectiveCamera(75, containerWidth / containerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);

            // Setup renderer with one-third width
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(containerWidth, containerHeight);
            document.getElementById('three-container').appendChild(renderer.domElement);

            // Update window resize handler
            window.addEventListener('resize', () => {
                const newWidth = window.innerWidth / 3;
                const newHeight = window.innerHeight;
                camera.aspect = newWidth / newHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(newWidth, newHeight);
            });

            // Add OrbitControls for better interaction
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Add ambient and directional light
            const ambientLight = new THREE.AmbientLight(0x404040);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(5, 5, 5);
            scene.add(ambientLight);
            scene.add(directionalLight);

            // Add coordinate axes helper
            const axesHelper = new THREE.AxesHelper(5);
            scene.add(axesHelper);

            // Add grid helper
            const gridHelper = new THREE.GridHelper(10, 10);
            scene.add(gridHelper);

            // Create LED representations
            ledPositions.forEach(pos => {
                const geometry = new THREE.SphereGeometry(0.1, 16, 16);
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0x000000,
                    emissive: 0x000000
                });
                const light = new THREE.Mesh(geometry, material);
                
                // Set position from data
                light.position.set(pos.x, pos.y, pos.z);
                scene.add(light);
                lights[pos.id] = light;

                // Create individual LED controls with updated structure
                const control = document.createElement('div');
                control.className = 'led-control';
                control.innerHTML = `
                    <h3>LED ${pos.id}</h3>
                    <div class="control-row">
                        <input type="color" id="color-${pos.id}" value="#000000">
                        <button onclick="updateLED(${pos.id})">Update</button>
                    </div>
                `;
                document.getElementById('individual-controls').appendChild(control);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Update controls in animation loop
            renderer.render(scene, camera);
        }

        function updateLED(id) {
            const color = document.getElementById(`color-${id}`).value;
            const rgbColor = new THREE.Color(color);
            
            fetch('/update_led', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    id: id,
                    color: color
                })
            }).then(response => response.json())
              .then(data => {
                  if (data.success) {
                      lights[id].material.color.set(rgbColor);
                      lights[id].material.emissive.set(rgbColor);
                      lights[id].material.needsUpdate = true;
                  }
              });
        }

        function uploadMusic() {
                const fileInput = document.getElementById('musicUpload');
                const musicInfoDiv = document.getElementById('musicInfo');
                const file = fileInput.files[0];
                
                if (!file) {
                    alert('Please select a music file');
                    return;
                }
                
                const formData = new FormData();
                formData.append('file', file);
                
                fetch('/upload_music', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        musicInfoDiv.innerHTML = `
                            <p>Tempo: ${data.tempo} BPM</p>
                            <p>Beat Count: ${data.beat_count}</p>
                            <p>Duration: ${data.duration} seconds</p>
                        `;
                        
                        // Enable beat animation buttons
                        document.getElementById('beatStart').disabled = false;
                        document.getElementById('beatStop').disabled = true;
                    } else {
                        musicInfoDiv.innerHTML = `<p>Error: ${data.message}</p>`;
                    }
                })
                .catch(error => {
                    musicInfoDiv.innerHTML = `<p>Error: ${error}</p>`;
                });
            }
        
        function startBeatAnimation() {
            document.getElementById('beatStart').disabled = true;
            document.getElementById('beatStop').disabled = false;
            
            fetch('/start_beat_animation', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Start polling when animation starts
                    if (!pollInterval) {
                        pollInterval = setInterval(pollLEDStates, 1000);
                    }
                } else {
                    console.error('Failed to start beat animation:', data.message);
                    document.getElementById('beatStart').disabled = false;
                    document.getElementById('beatStop').disabled = true;
                }
            });
        }
        
        function stopBeatAnimation() {
            document.getElementById('beatStart').disabled = false;
            document.getElementById('beatStop').disabled = true;
            
            fetch('/stop_beat_animation', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Stop polling when animation stops
                    if (pollInterval) {
                        clearInterval(pollInterval);
                        pollInterval = null;
                    }
                    
                    // Reset all LED visualizations
                    Object.values(lights).forEach(light => {
                        light.material.color.set(new THREE.Color(0x000000));
                        light.material.emissive.set(new THREE.Color(0x000000));
                        light.material.needsUpdate = true;
                    });
                } else {
                    console.error('Failed to stop beat animation:', data.message);
                    document.getElementById('beatStart').disabled = true;
                    document.getElementById('beatStop').disabled = false;
                }
            });
        }
    
        // Initially disable beat animation buttons
        document.getElementById('beatStart').disabled = true;
        document.getElementById('beatStop').disabled = true;

        function updateAll() {
            const color = document.getElementById('all-color').value;
            const rgbColor = new THREE.Color(color);
            
            fetch('/update_all', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    color: color
                })
            }).then(response => response.json())
              .then(data => {
                  if (data.success) {
                      Object.values(lights).forEach(light => {
                          light.material.color.set(rgbColor);
                          light.material.emissive.set(rgbColor);
                          light.material.needsUpdate = true;
                      });
                  }
              });
        }

        // Add polling function to sync 3D view with LED states
        function pollLEDStates() {
            fetch('/get_led_states')
                .then(response => response.json())
                .then(states => {
                    Object.entries(states).forEach(([id, color]) => {
                        const light = lights[id];
                        if (light) {
                            const rgbColor = new THREE.Color(color);
                            light.material.color.set(rgbColor);
                            light.material.emissive.set(rgbColor);
                            light.material.needsUpdate = true;
                        }
                    });
                });
        }

        // Poll every second when animations are running
        let pollInterval = null;

        function startRain() {
            document.getElementById('rainStart').disabled = true;
            document.getElementById('rainStop').disabled = false;
            
            fetch('/animation/start_rain', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            }).then(response => response.json())
              .then(data => {
                  if (data.success) {
                      // Start polling when animation starts
                      pollInterval = setInterval(pollLEDStates, 1000);
                  } else {
                      console.error('Failed to start animation:', data.message);
                      document.getElementById('rainStart').disabled = false;
                      document.getElementById('rainStop').disabled = true;
                  }
              });
        }

        function stopRain() {
            document.getElementById('rainStart').disabled = false;
            document.getElementById('rainStop').disabled = true;
            
            fetch('/animation/stop_rain', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            }).then(response => response.json())
              .then(data => {
                  if (data.success) {
                      // Stop polling when animation stops
                      if (pollInterval) {
                          clearInterval(pollInterval);
                          pollInterval = null;
                      }
                      // Reset all LED visualizations
                      Object.values(lights).forEach(light => {
                          light.material.color.set(new THREE.Color(0x000000));
                          light.material.emissive.set(new THREE.Color(0x000000));
                          light.material.needsUpdate = true;
                      });
                  } else {
                      console.error('Failed to stop animation:', data.message);
                      document.getElementById('rainStart').disabled = true;
                      document.getElementById('rainStop').disabled = false;
                  }
              });
        }

        // Initialize everything
        init();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / 2 / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth / 2, window.innerHeight);
        });
    </script>
</body>
</html>
